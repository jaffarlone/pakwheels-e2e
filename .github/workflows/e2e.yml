name: PakWheels E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:          # "Run workflow" button in the Actions tab

jobs:

  # ── Job 1: HTTP-layer API tests (fast, no browser needed) ─────────────
  api-tests:
    name: API Tests (HTTP layer)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # API tests use Playwright's request fixture — no browser install needed
      - name: Install Playwright (no browsers)
        run: npx playwright install --with-deps chromium
        # chromium needed only for the request fixture internals

      - name: Run API tests
        run: npx playwright test tests/api.spec.js --reporter=list,junit,html
        env:
          CI: true
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/junit-api.xml

      - name: Upload API test JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-api
          path: test-results/junit-api.xml
          retention-days: 14

      - name: Upload API HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report-api
          path: |
            test-results/html/
            playwright-report/
          retention-days: 14

      - name: Comment API HTML report link on PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            Playwright API HTML report has been uploaded as an artifact for this workflow run.

            Download from: https://github.com/${{ github.repository }}/suites/${{ github.run_id }}/artifacts

      - name: Upload API warnings artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-warnings
          path: test-results/api-warnings.json
          retention-days: 14

  # ── Job 2: Full browser E2E suite ────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Chrome browser)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: api-tests          # only run if API layer is healthy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chrome --with-deps

      - name: Run E2E test suite (all specs except API suite)
        run: npx playwright test --grep-invert "PakWheels API"
        env:
          CI: true

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: test-results/html/
          retention-days: 14

      - name: Upload JUnit XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-e2e
          path: test-results/junit.xml
          retention-days: 14

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 14

      - name: Upload failure screenshots & videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-artifacts
          path: test-results/
          retention-days: 7
